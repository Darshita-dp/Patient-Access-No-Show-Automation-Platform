# Local run for the Patient Access & No-Show Automation Platform.
#
# Fast path (recommended for reviewers):
#     docker compose up --build
#   Starts:
#     - api      -> http://localhost:8000  (Swagger UI at /docs)
#     - frontend -> http://localhost:5173  (React operations app)
#   Data lives in ./data (bind-mounted), model artifacts in ./models — no
#   database is required. The API runs in CSV mode.
#
# Optional PostgreSQL:
#     docker compose --profile postgres up --build
#   Starts the same services plus a Postgres 16 instance seeded from ./sql/.
#   The API still runs in CSV mode; the database exists so you can point Power
#   BI, psql, or a client tool at localhost:5432 for the SQL model.
#
# The project also runs fine without Docker — see the README quick start.

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: patient-access-api:local
    container_name: patient_access_api
    ports:
      - "8000:8000"
    environment:
      DATA_MODE: csv
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: patient-access-frontend:local
    container_name: patient_access_frontend
    ports:
      - "5173:5173"
    environment:
      # The browser (not the container) calls the API, so localhost is correct.
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  db:
    profiles: ["postgres"]
    image: postgres:16
    container_name: patient_access_db
    environment:
      POSTGRES_USER: access_admin
      POSTGRES_PASSWORD: access_admin
      POSTGRES_DB: patient_access
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  pgdata:
